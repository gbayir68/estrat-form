<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrat Kültür Sanat - Ön Kayıt Formu</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome (Sağ alttaki WhatsApp amblemi için) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Form Konteyneri -->
    <div class="form-container">
        <div class="logo-area">
            <h2>ESTRAT KÜLTÜR SANAT</h2>
            <p>Çocuk Atölyeleri Ön Kayıt Formu</p>
        </div>

        <form id="gitUpForm">
            <!-- ASAMALI KATMANLAR (GİT-UP) -->
            
            <!-- Aşama 1: İsim -->
            <div class="form-step active" id="step1">
                <label for="childName">1. Çocuğun Adı - Soyadı:</label>
                <input type="text" id="childName" placeholder="Zeynep Yılmaz" required>
                <button type="button" class="next-btn" onclick="nextStep(1, 2)">İleri <i class="fas fa-arrow-up"></i></button>
            </div>

            <!-- Aşama 2: Doğum Tarihi ve Otomatik Yaş -->
            <div class="form-step" id="step2">
                <label for="birthDate">2. Çocuğun Doğum Tarihi:</label>
                <input type="date" id="birthDate" onchange="calculateAge()" required>
                
                <div class="calculated-age-box" id="ageBox" style="display:none;">
                    <span>Belirlenen Yaş Grubu:</span>
                    <strong id="ageResult">--</strong>
                </div>
                
                <div class="btn-group">
                    <button type="button" class="prev-btn" onclick="prevStep(2, 1)">Geri</button>
                    <button type="button" class="next-btn" onclick="nextStep(2, 3)">İleri <i class="fas fa-arrow-up"></i></button>
                </div>
            </div>

            <!-- Aşama 3: Atölye Seçimi -->
            <div class="form-step" id="step3">
                <label>3. Tercih Edilen Atölye:</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="workshop" value="Yaratıcı Drama" required>
                        <span>Yaratıcı Drama / Tiyatro</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="workshop" value="Müzik Atölyesi">
                        <span>Müzik Atölyesi</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="workshop" value="Gastronomi Mutfak">
                        <span>Gastronomi Mutfak</span>
                    </label>
                </div>
                <div class="btn-group">
                    <button type="button" class="prev-btn" onclick="prevStep(3, 2)">Geri</button>
                    <button type="button" class="next-btn" onclick="nextStep(3, 4)">İleri <i class="fas fa-arrow-up"></i></button>
                </div>
            </div>

            <!-- Aşama 4: Veli İletişim & Onay & Bitiş -->
            <div class="form-step" id="step4">
                <label for="parentPhone">4. Veli Telefon Numarası:</label>
                <input type="tel" id="parentPhone" placeholder="0555XXXXXXX" pattern="[0-9]{11}" required>

                <label class="checkbox-option">
                    <input type="checkbox" id="kvkkCheck" required>
                    <span>KVKK ve Görsel Kullanım İznini Onaylıyorum.</span>
                </label>

                <div class="btn-group">
                    <button type="button" class="prev-btn" onclick="prevStep(4, 3)">Geri</button>
                    <button type="submit" class="submit-btn">Başvuruyu Tamamla <i class="fas fa-check"></i></button>
                </div>
            </div>
        </form>
    </div>

    <!-- Sabit Can Simidi: WhatsApp İletişim Butonu -->
    <a href="https://wa.me/905XXXXXXXXX?text=Merhaba,%20Estrat%20Kültür%20Sanat%20eğitimleri%20hakkında%20bilgi%20almak%20istiyorum." class="fixed-whatsapp" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
